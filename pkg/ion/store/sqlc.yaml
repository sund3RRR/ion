version: "2"
sql:
  - engine: "sqlite"
    schema: "migrations"
    queries: "queries"
    gen:
      go:
        package: "sqlc"
        out: "sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - column: "packages.outputs"
            go_type:
              type: "StringList"
          - column: "licenses.open"
            go_type: "bool"
          - column: "files.executable"
            go_type: "bool"
